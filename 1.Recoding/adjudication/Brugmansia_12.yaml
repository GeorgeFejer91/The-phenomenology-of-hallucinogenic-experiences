summary:
  total_canonical_scenes: 9
  both: 7
  only_A: 0
  only_B: 2
  scene_individuation_jaccard: 0.778
  classification_notes:
    - "Strong scene-level individuation (7/9 shared + 2 only_B)."
    - "Systematic classification disagreement on type-of-visual-alteration for scenes involving objects in dream-like sequences (S03 pizza, S04 newspaper, S05 smoke): A says 'incrusted object', B says 'full-blown immersive'. This is a genuine taxonomic disagreement — the narrator reports these as dream-sequences which supports 'full-blown immersive', but the individual objects are discrete which supports 'incrusted'. Both defensible."
    - "Alessandra records per-object single-word excerpts ('star', 'pen', 'girlfriend', 'pizza', 'newspaper', 'smoke') as separate rows — a coding-style quirk, not additional scenes."
    - "S09 split-vs-lump discrepancy: A lumped both star incidents into one scene, B split them. I chose B's split based on narrative evidence of temporal separation."
