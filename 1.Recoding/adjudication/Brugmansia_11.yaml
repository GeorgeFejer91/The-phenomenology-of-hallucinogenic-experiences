summary:
  total_canonical_scenes: 4
  both: 4
  only_A: 0
  only_B: 0
  scene_individuation_jaccard: 1.0
  classification_notes:
    - "Perfect scene-level individuation — both raters see the same 4 NDE phases."
    - "Alessandra codes 14 scene-level excerpts, Alessio only 7: A fragments each scene into many object-level sub-entries (corridor as artefact, darkness as inorganic-entity, tunnel as artefact) while B codes the scene holistically. This is the dominant pattern for this coder pair."
    - "S02 has a genuine and important semantic disagreement: is the 'force dragging me' a nonsensory (A) or tactile (B) hallucination? Narrative evidence leans tactile."
    - "Disagreement on modal status for S03: A=impossible, B=possible-but-improbable. Both are defensible readings."
    - "Trip-level: B codes Insight (metaphysical, religious) which A does not; A codes domain-specific projections which B does not. Complementary rather than conflicting captures of the same passages."
