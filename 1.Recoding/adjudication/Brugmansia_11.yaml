coder_A: Alessandra
coder_B: Alessio
dose_raw: "1.5 cups of concentrated decoction"
word_count: 779

# Note on scene individuation for this trip:
# The narrative describes a single continuous near-death experience (NDE).
# Both raters broke it into sub-passages focused on different attributes.
# I treat the NDE as 4 canonical scenes corresponding to the 4 phase
# transitions the narrator himself marks: (1) pre-corridor life-flash,
# (2) the corridor and dragging force, (3) the T-junction with dark/light
# contrast, (4) the wind-force arrival and return to consciousness.

scenes:
  - scene_id: Brugmansia_11_S01
    status: both
    canonical_desc: "Life flashes before eyes; sees friends and relatives waving goodbye, crying, grieving"
    canonical_span_start: 520
    canonical_span_end: 720
    rater_A:
      worksheet_refs: [A01, A02, A03]
      items:
        - type_of_visual_alteration_full-blown_immersive_hallucination
        - visual_hallucination_human_relatives_acquaintances
        - auditory_hallucination_human_relatives_acquaintances
        - modal_status_of_the_hallucination_impossible_event
        - dynamics_of_the_hallucination_object_constancy
    rater_B:
      worksheet_refs: [B01, B02]
      items:
        - type_of_visual_alteration_full-blown_immersive_hallucination
        - visual_hallucination_human_relatives_acquaintances
        - modal_status_of_the_hallucination_impossible_event
    rationale: "Same opening-scene. Both code full-blown immersive + acquaintance + impossible. A additionally captures the auditory component (crying) and object-constancy — both valid; B missed them."

  - scene_id: Brugmansia_11_S02
    status: both
    canonical_desc: "Being dragged down a corridor by a force; then free-floating / moving fast"
    canonical_span_start: 641
    canonical_span_end: 1300
    rater_A:
      worksheet_refs: [A04, A05, A06]
      items:
        - visual_hallucination_artefact_city_building_furniture
        - nonsensory_hallucination_extraordinary_entity
        - visual_hallucination_inorganic_entity_other
    rater_B:
      worksheet_refs: [B03, B04]
      items:
        - tactile_hallucination_extraordinary_entity
        - type_of_visual_alteration_full-blown_immersive_hallucination
        - modal_status_of_the_hallucination_impossible_event
    rationale: "Same corridor + dragging-force + free-floating scene. MAJOR classification disagreement on the force: A codes it as NONSENSORY hallucination of extraordinary entity; B codes it as TACTILE hallucination of extraordinary entity. The narrative text 'dragging me down' supports tactile (B). A also codes the corridor itself as a visual-artefact and the movement-feeling as visual-inorganic; B instead captures the overall immersive quality."

  - scene_id: Brugmansia_11_S03
    status: both
    canonical_desc: "T-Junction with dark evil left / light divine right; feelings contrast radically between sides"
    canonical_span_start: 1559
    canonical_span_end: 2800
    rater_A:
      worksheet_refs: [A07, A08, A09, A10, A11]
      items:
        - type_of_visual_alteration_full-blown_immersive_hallucination
        - visual_hallucination_geometrical_pattern
        - visual_hallucination_inorganic_entity_other
        - visual_hallucination_artefact_city_building_furniture
        - modal_status_of_the_hallucination_impossible_event
    rater_B:
      worksheet_refs: [B05]
      items:
        - type_of_visual_alteration_full-blown_immersive_hallucination
        - dynamics_of_the_hallucination_object_constancy
        - modal_status_of_the_hallucination_possible_but_improbable_event
    rationale: "Same T-Junction scene. Both code full-blown immersive. Disagreement on modal status: A=impossible, B=possible-but-improbable (reasonable disagreement for an NDE). A additionally codes T-junction as 'geometrical pattern' (literal but arguably over-literal — T is a shape), and codes darkness/light/tunnel as inorganic-entity and artefact sub-objects. B treats it holistically."

  - scene_id: Brugmansia_11_S04
    status: both
    canonical_desc: "Great wind-force approaches with sound, arrives, hits him, sent back to consciousness"
    canonical_span_start: 3030
    canonical_span_end: 3900
    rater_A:
      worksheet_refs: [A12, A13, A14]
      items:
        - auditory_hallucination_inorganic_entity_other
        - visual_hallucination_inorganic_entity_other
        - tactile_hallucination_inorganic_entity
    rater_B:
      worksheet_refs: [B06, B07]
      items:
        - auditory_hallucination_inorganic_entity_other
        - visual_hallucination_inorganic_entity_other
    rationale: "Same wind-force scene. Both code auditory + visual inorganic. A additionally captures the tactile modality (wind 'hitting' him) which B missed."

