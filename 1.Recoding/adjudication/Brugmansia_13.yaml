summary:
  total_canonical_scenes: 10
  both: 8
  only_A: 1
  only_B: 1
  scene_individuation_jaccard: 0.8
  classification_notes:
    - "Excellent scene-level agreement (8/10) on a rich trip with 10+ distinct hallucinatory episodes."
    - "DOMINANT classification disagreement: across 5 shared scenes (S05, S06, S07, S09), A codes 'incrusted object' while B codes 'full-blown immersive'. This is a consistent semantic disagreement: scenes where the narrator is fully convinced of an alternate reality (driving his own car, sleeping in bed when awake in chair, cat on bed when cat is outside) can be coded either way. Important to flag for reconciliation."
    - "A much more thoroughly catalogs object-classes within each scene (e.g. steering wheel, dash, brake lights, cars in the phantom-car scene); B codes scenes holistically."
    - "S10: B correctly captured the tactile modality ('touched her hair') which A missed."
    - "S08: genuine disagreement on object class (extraordinary entity vs human others) on the shadow figures."
