    - "B never codes 'modal status'; A codes it consistently. This is a rule-usage asymmetry more than a semantic disagreement."
    - "A picks up more peripheral sensory-perceptual oddities as scenes (S05 red hands, S06 shower writing, S11 text colours); B is more conservative about individuating these as scenes."
    - "B codes biological/psychological projection phenomena (breathing walls, breathing door) very sparsely — A codes them under trip-level domain-violation."
